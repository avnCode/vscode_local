name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## NDViewer ${{ github.ref_name }}

            ### Install
            1. Download `app-debug.apk` below
            2. Enable "Install from unknown sources" on your Android device
            3. Open the downloaded file to install

            ### What's in this release
            - View `.ipynb`, `.py`, `.md`, `.pdf`, images, and more
            - VS Code dark theme
            - Folder browser with expandable file tree
          files: build/app/outputs/flutter-apk/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
