name: vscode_local
description: A VS Code-style file viewer for Android. View .ipynb, .py, .md, .pdf, images and more.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  file_picker: ^6.1.1
  permission_handler: ^11.3.1
  flutter_highlight: ^0.7.0
  flutter_markdown: ^0.7.3
  flutter_pdfview: ^1.3.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
